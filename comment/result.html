<!DOCTYPE html>
<html lang="en">
    <head>
        <title>评论结果页面</title>
        <style>
        body {TEXT-ALIGN: center;}
        .result{
            text-align: center;
            width: 40%;
            margin: auto;
        }
        .errorlist{color: red;}
        ul li{
            list-style-type: None;
        }
        </style>
    </head>
    <body>
        <div class="result">
            {% if succeed %}
                评论成功！
                <a href="{{ target }}">返回</a>
            {% else %}
                <ul class="errorlist">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                {% endfor %}
                </ul>
                <a href="javascript:window.history.back()">返回</a>
            {% endif %}
        </div>
    </body>
</html>
